<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sudoku</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="page">
      <div class="page-chrome" aria-label="Display settings">
        <button id="theme-toggle" class="chrome-button" type="button" aria-label="Toggle light or dark theme" title="Toggle theme">
          Theme: Light
        </button>
      </div>
      <div id="user-badge" class="user-badge hidden" aria-live="polite">
        <span id="user-badge-text"></span>
        <button id="user-logout" type="button">Sign out</button>
      </div>

      <section id="auth-section" class="auth" aria-label="Account">
        <div class="auth-panel">
          <div class="auth-fields">
            <label class="auth-field">
              <span>Email</span>
              <input id="auth-email" type="email" autocomplete="username" />
            </label>
            <label class="auth-field">
              <span>Password</span>
              <input id="auth-password" type="password" autocomplete="current-password" />
            </label>
          </div>
          <div class="auth-actions">
            <button id="auth-register" type="button">Create account</button>
            <button id="auth-login" type="button" class="control-muted">Sign in</button>
            <button id="auth-logout" type="button" class="control-muted hidden">Sign out</button>
          </div>
          <p id="auth-status" class="auth-status">Not signed in.</p>
        </div>
      </section>

      <div id="game-shell" class="hidden">
        <section class="hero">
          <h1>Sudoku</h1>
          <p class="subtitle">
            New game when you’re ready. Notes and highlights help you stay organised.
          </p>
        </section>

        <section class="controls">
          <div class="control-group control-group-field">
            <label for="difficulty">Difficulty</label>
            <select id="difficulty">
              <option value="easy">Easy</option>
              <option value="medium">Medium</option>
              <option value="hard">Hard</option>
              <option value="vicious">Vicious</option>
            </select>
          </div>
          <div class="control-group control-group-actions">
            <button id="new-game" type="button">New game</button>
            <button id="reset-board" type="button">Reset board</button>
            <button id="show-incorrect" type="button">Show incorrect</button>
            <button id="solve-board" type="button">Solve board</button>
          </div>
        </section>

        <section class="game">
          <div class="board-stack">
            <div id="board" class="board" aria-label="Sudoku board"></div>
            <div class="panel status-panel">
              <div class="status-header">
                <p id="status-message">Loading puzzle...</p>
                <button id="hint" class="hint-button" type="button" aria-label="Get a hint" title="Get a hint for the next step">
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M12 3a7 7 0 0 0-4.3 12.5c.9.7 1.3 1.3 1.3 2.3V19h6v-1.2c0-1 .4-1.6 1.3-2.3A7 7 0 0 0 12 3z"></path>
                    <path d="M9.5 22h5"></path>
                    <path d="M10 19h4"></path>
                  </svg>
                  <span>Hint</span>
                </button>
              </div>
            </div>
          </div>
          <aside class="side-panel">
            <div class="panel tool-panel">
              <div class="number-pad-wrap">
                <button id="toggle-pencil" type="button" class="control-muted">Pencil mode: Off</button>
                <div id="number-pad" class="number-pad" aria-label="Number pad"></div>
                <div id="highlight-palette" class="highlight-palette" role="group" aria-label="Cell highlight palette">
                  <button type="button" class="highlight-swatch" data-mark="amber" aria-label="Highlight selected cells amber" title="Highlight amber"></button>
                  <button type="button" class="highlight-swatch" data-mark="sage" aria-label="Highlight selected cells green" title="Highlight green"></button>
                  <button type="button" class="highlight-swatch" data-mark="sky" aria-label="Highlight selected cells blue" title="Highlight blue"></button>
                  <button type="button" class="highlight-swatch" data-mark="rose" aria-label="Highlight selected cells pink" title="Highlight pink"></button>
                  <button type="button" class="highlight-swatch highlight-clear-all" data-mark="clear-all" aria-label="Clear all highlights" title="Clear all highlights">C</button>
                  <button type="button" class="highlight-swatch highlight-clear" data-mark="none" aria-label="Remove highlight from selected cells" title="Remove highlight">×</button>
                </div>
                <button id="auto-notes" class="clear-button control-muted icon-button" type="button" aria-label="Fill pencil marks with valid candidates for selected cells" title="Fill pencil marks with valid candidates for selected cells">
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <rect x="4" y="4" width="16" height="16" rx="2"></rect>
                    <circle cx="9" cy="9" r="1.2"></circle>
                    <circle cx="15" cy="11.5" r="1.2"></circle>
                    <circle cx="11.5" cy="15" r="1.2"></circle>
                  </svg>
                  <span>Cell notes</span>
                </button>
                <button id="auto-notes-all" class="clear-button control-muted icon-button" type="button" aria-label="Fill pencil marks with valid candidates for all empty cells" title="Fill pencil marks with valid candidates for all empty cells">
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <rect x="3.5" y="3.5" width="17" height="17" rx="2"></rect>
                    <path d="M8 8h8"></path>
                    <path d="M8 12h8"></path>
                    <path d="M8 16h8"></path>
                    <circle cx="6.2" cy="8" r="0.9"></circle>
                    <circle cx="6.2" cy="12" r="0.9"></circle>
                    <circle cx="6.2" cy="16" r="0.9"></circle>
                  </svg>
                  <span>All notes</span>
                </button>
                <button id="clear-cell" class="clear-button control-muted" type="button">Clear cell</button>
                <button id="clear-notes-all" class="clear-button control-muted icon-button" type="button" aria-label="Clear all pencil marks" title="Clear all pencil marks">
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M7 16l4-10h2l4 10"></path>
                    <path d="M9 12h6"></path>
                    <path d="M6 18h12"></path>
                  </svg>
                  <span>Clear notes</span>
                </button>
                <button id="undo-action" class="clear-button control-muted" type="button">Undo</button>
              </div>
            </div>
          </aside>
        </section>
      </div>
    </main>

      <div id="completion-burst" class="completion-burst" aria-hidden="true">
        <div class="completion-scrim"></div>
        <div class="completion-card">
          <button id="dismiss-completion" class="dismiss-completion" type="button" aria-label="Dismiss celebration">x</button>
          <p class="completion-kicker">Puzzle Complete</p>
          <h2>You cracked it.</h2>
          <p>The whole board is clean. Enjoy the victory lap.</p>
          <div id="confetti-field" class="confetti-field" aria-hidden="true"></div>
        </div>
      </div>

    <script src="/static/app.js" defer></script>
  </body>
</html>
