<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">Sudoku Logo</title>
  <desc id="desc">A stylized Sudoku grid mark with a warm accent wordmark.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8ef" />
      <stop offset="100%" stop-color="#f2e0c7" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cc5a2d" />
      <stop offset="100%" stop-color="#8f3410" />
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="180" height="180" rx="38" fill="url(#bg)" />
  <rect x="20" y="20" width="180" height="180" rx="38" fill="none" stroke="#5f5447" stroke-opacity="0.25" stroke-width="2" />

  <g transform="translate(44 44)">
    <rect x="0" y="0" width="132" height="132" rx="20" fill="#fffdf8" stroke="#5f5447" stroke-width="3" />

    <g stroke="#5f5447" stroke-opacity="0.35" stroke-width="1.3">
      <line x1="44" y1="0" x2="44" y2="132" />
      <line x1="88" y1="0" x2="88" y2="132" />
      <line x1="0" y1="44" x2="132" y2="44" />
      <line x1="0" y1="88" x2="132" y2="88" />
    </g>

    <g stroke="#5f5447" stroke-width="3">
      <line x1="0" y1="0" x2="0" y2="132" />
      <line x1="132" y1="0" x2="132" y2="132" />
      <line x1="0" y1="0" x2="132" y2="0" />
      <line x1="0" y1="132" x2="132" y2="132" />
      <line x1="0" y1="44" x2="132" y2="44" />
      <line x1="0" y1="88" x2="132" y2="88" />
      <line x1="44" y1="0" x2="44" y2="132" />
      <line x1="88" y1="0" x2="88" y2="132" />
    </g>

    <rect x="44" y="44" width="44" height="44" rx="10" fill="url(#accent)" />
    <text x="66" y="75" text-anchor="middle" dominant-baseline="middle" font-size="26" font-weight="700" fill="#fffaf3" font-family="Georgia, 'Times New Roman', serif">5</text>
    <text x="22" y="22" text-anchor="middle" dominant-baseline="middle" font-size="22" font-weight="700" fill="#8f3410" font-family="Georgia, 'Times New Roman', serif">1</text>
    <text x="110" y="110" text-anchor="middle" dominant-baseline="middle" font-size="22" font-weight="700" fill="#8f3410" font-family="Georgia, 'Times New Roman', serif">9</text>
  </g>

  <g transform="translate(230 68)">
    <text x="0" y="52" font-size="78" font-weight="700" letter-spacing="1.5" fill="url(#accent)" font-family="Georgia, 'Times New Roman', serif">SUDOKU</text>
  </g>
</svg>
